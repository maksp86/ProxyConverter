name: Build & Release

on:
  push:
    branches: [ master ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            extension: .exe
            name: ProxyConverter-win-x64.exe

          - rid: linux-x64
            runner: ubuntu-latest
            extension: ""
            name: ProxyConverter-linux-x64

          - rid: linux-arm64
            runner: ubuntu-latest
            extension: ""
            name: ProxyConverter-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Настраиваем .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Публикуем single-file self-contained
      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish ProxyConverter.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish/${{ matrix.rid }}

      # Переименовываем в удобное имя
      - name: Rename binary
        shell: bash
        run: |
          mv "publish/${{ matrix.rid }}/ProxyConverter${{ matrix.extension }}" \
             "${{ matrix.name }}"

      # Делаем исполняемым для Linux
      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "${{ matrix.name }}"

      # Загружаем артефакт (для CI)
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

      # Прикрепляем к релизу (только когда создаётся релиз)
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Дополнительный шаг: создаём changelog (по желанию)
  release-info:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show release info
        run: echo "✅ Артефакты успешно прикреплены к релизу ${{ github.event.release.tag_name }}"