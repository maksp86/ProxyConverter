name: Build & Release

on:
  push:
    branches: [ master ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            extension: .exe
            name: ProxyConverter-win-x64.exe

          - rid: linux-x64
            runner: ubuntu-latest
            extension: ""
            name: ProxyConverter-linux-x64

          - rid: linux-arm64
            runner: ubuntu-latest
            extension: ""
            name: ProxyConverter-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish ${{ matrix.rid }}
        run: |
          cd ProxyConverter && dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=false -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ../publish/${{ matrix.rid }}

      - name: Rename binary
        shell: bash
        run: |
          mv "publish/${{ matrix.rid }}/ProxyConverter${{ matrix.extension }}" "${{ matrix.name }}"

      - name: Make executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-info:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show release info
        run: echo "Artifacts attached ${{ github.event.release.tag_name }}"