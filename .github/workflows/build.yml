name: Build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        runtime: [win-x64, linux-x64, osx-x64]
    runs-on: ${{ matrix.runtime == 'win-x64' && 'windows-latest' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          cd ProxyConverter
          dotnet publish -c Release -r ${{ matrix.runtime }} --self-contained true --property:PublishSingleFile=true --property:IncludeNativeLibrariesForSelfExtract=true -o ../publish/${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxyconverter-${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}/*

      - name: Release (при теге)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/**/*/*